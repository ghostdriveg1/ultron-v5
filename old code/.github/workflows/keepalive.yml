name: Keep Nancy Alive

on:
  schedule:
    - cron: '*/15 * * * *' # Run every 15 minutes
  workflow_dispatch: # Allow manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Nancy HF Space
        run: |
          # Replace with your actual Hugging Face Space URL in deployment
          curl -sf https://nancy.hf.space/health || echo "Nancy ping attempted."
