bind 0.0.0.0
port 6379
daemonize yes
loglevel notice
logfile /var/log/redis/redis-server.log

# Memory limits - use all available free RAM (CPU Basic = ~14GB usable)
maxmemory 12gb
maxmemory-policy volatile-lru

# Persistence - AOF for durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no

# Snapshot (RDB) fallback
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# Performance
hz 20
dynamic-hz yes
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Disable protected-mode (Webdis runs on same host)
protected-mode no

# Lazy freeing for non-blocking DELs
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
