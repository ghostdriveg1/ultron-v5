bind 0.0.0.0
port 6379
daemonize no
loglevel notice
logfile ""

# Memory limits - HF free tier has ~2GB total, keep Redis small
maxmemory 256mb
maxmemory-policy allkeys-lru

# Disable ALL persistence - ephemeral cache only
# AOF and RDB cause write failures and OOM on HF Spaces
appendonly no
save ""

# Performance
hz 20
dynamic-hz yes
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Disable protected-mode (Webdis runs on same host)
protected-mode no

# Lazy freeing for non-blocking DELs
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
